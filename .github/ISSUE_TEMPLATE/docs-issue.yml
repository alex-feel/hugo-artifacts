name: Documentation Issue
description: Report an issue with the documentation
labels: [documentation]
body:
  # NOTE: Update this dropdown when adding or removing user-facing documentation files.
  - type: dropdown
    id: affected-docs
    attributes:
      label: Affected Documentation
      description: Select the documentation file(s) with the issue.
      multiple: true
      options:
        - README.md (root)
        - CONTRIBUTING.md
        - LICENSE
        - modules/pwa/README.md
        - modules/workbox/README.md
        - modules/idb/README.md
        - shortcodes/github-repo/README.md
        - examples/backend-cloudflare-worker/README.md
        - examples/backend-express/README.md
        - examples/backend-firebase-functions/README.md
        - 'Other/not sure'
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of documentation issue is this?
      options:
        - Inaccurate
        - Missing
        - Unclear
        - Outdated
        - Broken link
        - Typo
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        Describe the documentation issue. What is wrong or missing? If applicable, include the section or paragraph where you found the problem.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: If you have a suggestion for how to fix or improve the documentation, describe it here.
