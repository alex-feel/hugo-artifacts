name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Hugo + Go + lints)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Verify Hugo and Go versions
        run: |
          hugo version
          go version
          node --version
          npm --version

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify leaf go.mod files parse
        shell: bash
        run: |
          set -euo pipefail
          # Every leaf go.mod file MUST parse via `go mod edit -fmt -print`.
          # This is a read-only operation that does NOT require network access
          # and works for modules whose dependencies include non-Go-aware
          # upstreams (workbox, idb) that cannot be resolved by the Go module
          # proxy. Each leaf go.mod is verified independently from its own
          # directory. Keep this list in sync with the leaf */go.mod set.
          leaves=(
            modules/pwa
            modules/workbox
            modules/idb
            modules/seo
            modules/social-share
            modules/search
            modules/images
            shortcodes/github-repo
            shortcodes/hf-space
            shortcodes/callout
            shortcodes/youtube-embed
            shortcodes/arxiv-paper
            modules/pwa/test/fixture
            modules/social-share/test/fixture
            modules/search/test/fixture
            modules/images/test/fixture
          )
          for leaf in "${leaves[@]}"; do
            echo "::group::go mod edit -fmt -print -- ${leaf}/go.mod"
            ( cd "${leaf}" && go mod edit -fmt -print )
            echo "::endgroup::"
          done

      - name: Hugo mod graph (standalone modules)
        shell: bash
        run: |
          set -euo pipefail
          # These leaf modules graph standalone: any module imports they
          # declare resolve over the Go module proxy at real tags (no
          # placeholder pseudo-versions), so no [module.replacements]
          # configuration is needed. Keep this list in sync
          # with the leaf module set. The pwa/workbox/idb chain is excluded:
          # it transitively depends on github.com/GoogleChrome/workbox or
          # github.com/jakearchibald/idb (both non-Go-aware), which cannot be
          # resolved by Hugo's module fetcher without consumer-side
          # replacements documented in modules/pwa/README.md Installation.
          for m in modules/seo modules/social-share modules/search modules/images shortcodes/github-repo shortcodes/hf-space shortcodes/callout shortcodes/youtube-embed shortcodes/arxiv-paper; do
            echo "::group::hugo mod graph -- ${m}"
            ( cd "${m}" && hugo mod graph )
            echo "::endgroup::"
          done

      - name: ESLint (eslint v9 flat config)
        run: npm run lint

      - name: Prettier (format:check)
        run: npm run format:check

      - name: Markdown lint (markdownlint-cli2)
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md

      - name: YAML lint (yamllint)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github
          config_file: .yamllint.yml
          strict: true

      - name: EditorConfig conformance
        shell: bash
        run: |
          set -euo pipefail
          # The checker is compiled from the Go module proxy (no dependency on
          # the GitHub releases API at run time) and executed directly, so
          # this step both installs AND runs the conformance check. It reads
          # .ecrc at the repo root, which disables the indent-size dimension:
          # indentation is governed by Prettier and the template docstring
          # style, while this check enforces the line endings, charset, final
          # newline, and trailing whitespace rules from .editorconfig.
          go install github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@v3.0.3
          "$(go env GOPATH)/bin/editorconfig-checker"
