social_share_sms = "Поделиться в SMS"
social_share_webshare = "Поделиться"
social_share_copy = "Скопировать ссылку"
social_share_print = "Распечатать страницу"

social_share_new_tab_hint = "(откроется в новом окне)"

social_share_copied = "Ссылка скопирована в буфер обмена"
