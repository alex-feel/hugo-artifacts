# Hugo PWA module -- English UI strings.
# Keys are CONSUMED by install/push/update banner partials. Defined here so the module ships its
# full i18n surface from one location. Templates lookup via `{{ T "pwa_install_button" }}`.

# Install prompt
pwa_install_button = "Install app"
pwa_install_dismiss = "Not now"
pwa_install_installed = "App installed"

# Push subscription
pwa_push_subscribe_button = "Enable notifications"
pwa_push_unsubscribe_button = "Disable notifications"
pwa_push_subscribed = "Notifications enabled"
pwa_push_unsubscribed = "Notifications disabled"
pwa_push_permission_denied = "Notifications blocked. Enable in browser settings."

# Update banner
pwa_update_available = "A new version is available."
pwa_update_apply = "Update"
pwa_update_dismiss = "Later"

# Offline message
pwa_offline_title = "You are offline"
pwa_offline_message = "This page is not available offline. Connect to the network and try again."
pwa_offline_retry = "Retry"
