# Hugo PWA module -- English UI strings.
# The offline keys are consumed by layouts/offline/single.html and content/_content.gotmpl. The
# install/push button keys are the consumer-side contract: install-prompt.html and
# push-subscribe.html emit no button markup themselves, and their docstrings show the consumer
# markup that looks these keys up via `{{ T "pwa_install_button" }}`. Update UX ships no module
# banner -- register.ts dispatches a `pwa:waiting` event and the consumer supplies any UI.

# Install prompt (consumer-side button markup)
pwa_install_button = "Install app"

# Push subscription (consumer-side button markup)
pwa_push_subscribe_button = "Enable notifications"
pwa_push_unsubscribe_button = "Disable notifications"

# Offline page
pwa_offline_title = "You are offline"
pwa_offline_message = "This page is not available offline. Connect to the network and try again."
pwa_offline_retry = "Retry"
