<!doctype html>
<html lang="{{ site.Language.Locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ site.Title }}</title>
    {{ if .Params.exercise_partials }}
      {{ partial "images/preload.html" (dict "page" . "src" "photo-1600.png" "dark" "photo-dark.png" "priority" true) }}
    {{ end }}
  </head>
  <body>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </body>
</html>
